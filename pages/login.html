<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Rehabilitasyon Eğitim Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS REFERANSLARI -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/toast-notification.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'primary': '#6366f1',
                        'primary-dark': '#4f46e5',
                        'secondary': '#8b5cf6',
                    }
                }
            }
        }
    </script>
</head>
<body class="font-poppins bg-gradient-to-br from-purple-100 via-blue-50 to-indigo-100 min-h-screen">

<!-- Loading Screen for Auth State -->
<div id="auth-loading" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto mb-4"></div>
        <p class="text-gray-600 font-medium">Kimlik doğrulanıyor...</p>
    </div>
</div>

<!-- Decorative Background -->
<div class="absolute top-10 left-10 w-32 h-32 bg-primary/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-10 right-10 w-40 h-40 bg-secondary/20 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 left-1/4 w-24 h-24 bg-pink-300/30 rounded-full blur-2xl"></div>

<!-- Rate Limiting Warning -->
<div id="rate-limit-warning" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-40">
    <div class="flex items-center space-x-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
        </svg>
        <span id="rate-limit-message">Çok fazla başarısız deneme</span>
    </div>
</div>

<div class="min-h-screen flex items-center justify-center p-4 relative">
    <!-- Main Login Container -->
    <div class="max-w-6xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden fade-in">
        <div class="grid lg:grid-cols-2 min-h-[600px]">

            <!-- Left Side - Login Form -->
            <div class="p-8 lg:p-12 flex flex-col justify-center">
                <!-- Back Button -->
                <button onclick="window.location.href='../index.html'" class="inline-flex items-center text-gray-600 hover:text-primary mb-8 transition-colors">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Geri Dön
                </button>

                <!-- Login Header -->
                <div class="mb-8">
                    <h1 class="text-4xl font-bold text-gray-800 mb-3">GİRİŞ YAP</h1>
                    <p class="text-gray-600">Rehabilitasyon eğitim sistemine güvenli erişim</p>
                </div>

                <!-- Enhanced Login Form -->
                <form id="loginForm" class="space-y-6" novalidate>
                    <!-- Email Input with Enhanced Validation -->
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                            </svg>
                        </div>
                        <input
                                type="email"
                                id="email"
                                name="email"
                                autocomplete="email"
                                placeholder="Email Adresiniz"
                                class="w-full pl-12 pr-4 py-4 bg-gray-50 border-0 rounded-2xl focus:bg-white focus:ring-2 focus:ring-primary/20 input-focus text-gray-700 transition-all duration-300"
                                required
                        >
                        <div id="email-error" class="hidden mt-2 text-sm text-red-600 flex items-center space-x-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                            </svg>
                            <span></span>
                        </div>
                    </div>

                    <!-- Password Input with Enhanced Validation -->
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input
                                type="password"
                                id="password"
                                name="password"
                                autocomplete="current-password"
                                placeholder="Şifreniz"
                                class="w-full pl-12 pr-12 py-4 bg-gray-50 border-0 rounded-2xl focus:bg-white focus:ring-2 focus:ring-primary/20 input-focus text-gray-700 transition-all duration-300"
                                required
                        >
                        <!-- Password Toggle Button -->
                        <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center">
                            <svg id="eye-open" class="w-5 h-5 text-gray-400 hover:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                            <svg id="eye-closed" class="w-5 h-5 text-gray-400 hover:text-gray-600 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"></path>
                            </svg>
                        </button>
                        <div id="password-error" class="hidden mt-2 text-sm text-red-600 flex items-center space-x-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                            </svg>
                            <span></span>
                        </div>
                    </div>

                    <!-- Forgot Password Link -->
                    <div class="text-right">
                        <button type="button" id="forgot-password" class="text-sm text-primary hover:text-primary-dark transition-colors">
                            Şifremi Unuttum
                        </button>
                    </div>

                    <!-- Enhanced Login Button -->
                    <button
                            type="submit"
                            id="login-submit"
                            class="w-full bg-gradient-to-r from-primary to-secondary hover:from-primary-dark hover:to-purple-600 text-white font-semibold py-4 px-6 rounded-2xl btn-hover shadow-lg hover:shadow-xl transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <span id="login-text">Giriş Yap</span>
                    </button>

                    <!-- Login Attempts Counter -->
                    <div id="login-attempts" class="hidden text-center text-sm text-gray-600">
                        <span id="attempts-text"></span>
                    </div>
                </form>

                <!-- Divider -->
                <div class="my-8">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-200"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-white text-gray-500 font-medium">Sosyal Medya ile Giriş</span>
                        </div>
                    </div>
                </div>

                <!-- Enhanced Social Login Buttons -->
                <div class="space-y-3">
                    <button
                            type="button"
                            id="google-login"
                            class="w-full flex items-center justify-center space-x-3 py-3 px-4 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors duration-200 disabled:opacity-50"
                    >
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span class="text-gray-700 font-medium">Google ile Giriş</span>
                    </button>
                </div>

                <!-- Security Notice -->
                <div class="mt-6 p-4 bg-blue-50 rounded-xl border border-blue-200">
                    <div class="flex items-start space-x-3">
                        <svg class="w-5 h-5 text-blue-600 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                        </svg>
                        <div>
                            <h4 class="text-sm font-semibold text-blue-800">Güvenlik Bildirimi</h4>
                            <p class="text-xs text-blue-700 mt-1">Verileriniz 256-bit SSL şifreleme ile korunmaktadır.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side - Enhanced Illustration -->
            <div class="bg-gradient-to-br from-primary via-secondary to-purple-600 p-8 lg:p-12 flex items-center justify-center relative overflow-hidden">
                <div class="absolute inset-0 opacity-10">
                    <div class="absolute top-20 left-20 w-32 h-32 bg-white rounded-full animate-pulse"></div>
                    <div class="absolute bottom-20 right-20 w-24 h-24 bg-white rounded-full animate-pulse" style="animation-delay: 1s;"></div>
                    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-40 h-40 bg-white rounded-full animate-pulse" style="animation-delay: 0.5s;"></div>
                </div>
                <div class="relative z-10">
                    <div class="bg-white/20 backdrop-blur-sm rounded-3xl p-8 max-w-sm mx-auto">
                        <div class="w-48 h-48 bg-white/30 rounded-3xl mx-auto mb-6 flex items-center justify-center overflow-hidden">
                            <div class="w-32 h-32 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full flex items-center justify-center animate-pulse">
                                <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                        </div>
                        <div class="absolute top-4 right-4 w-12 h-12 bg-yellow-400 rounded-full flex items-center justify-center shadow-lg animate-bounce">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </div>
                        <div class="text-center text-white">
                            <h3 class="text-xl font-semibold mb-2">Güvenli Giriş</h3>
                            <p class="text-white/80 text-sm">Gelişmiş güvenlik protokolleri ile korunan platform</p>
                        </div>
                    </div>
                    <div class="absolute -top-4 -left-4 w-8 h-8 bg-yellow-400 rounded-full animate-bounce"></div>
                    <div class="absolute -bottom-4 -right-4 w-6 h-6 bg-pink-400 rounded-full animate-pulse"></div>
                    <div class="absolute top-1/2 -left-8 w-4 h-4 bg-white rounded-full animate-ping"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Optimized JavaScript Architecture -->
<script type="module" src="../assets/js/supbaseManager.js"></script>
<script type="module" src="../assets/js/loginManager.js"></script>
</body>
</html>
